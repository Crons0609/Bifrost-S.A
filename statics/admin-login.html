<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bifrost S.A Admin Portal — Secure login for the Vortex management dashboard.">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Bifrost S.A</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/effects.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">

  <style>
    /* ══════════════════════════════════════════
       LOGIN PAGE — PREMIUM REDESIGN
    ══════════════════════════════════════════ */

    /* Animated grid background */
    .login-grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(60px); }
    }

    /* Corner glow orbs */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .login-orb--tl {
      width: 500px; height: 500px;
      top: -150px; left: -150px;
      background: radial-gradient(ellipse, rgba(212,175,55,0.10) 0%, transparent 70%);
      animation: floatY 10s ease-in-out infinite;
    }
    .login-orb--br {
      width: 400px; height: 400px;
      bottom: -100px; right: -100px;
      background: radial-gradient(ellipse, rgba(69,162,158,0.09) 0%, transparent 70%);
      animation: floatY 13s ease-in-out infinite reverse;
    }

    /* Card override */
    .admin-login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(8, 8, 16, 0.88);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.06),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(212,175,55,0.06),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Scanline shimmer at card top */
    .admin-login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(212,175,55,0.6) 30%,
        rgba(69,162,158,0.5) 70%,
        transparent 100%);
      animation: scanline 3s ease-in-out infinite;
    }

    @keyframes scanline {
      0%, 100% { opacity: 0; transform: scaleX(0.5); }
      50%       { opacity: 1; transform: scaleX(1); }
    }

    /* ── PREMIUM INPUT FIELDS ── */
    .login-field {
      position: relative;
      margin-bottom: 0;
    }

    .login-field__input {
      width: 100%;
      padding: 1.1rem 1rem 1.1rem 3.2rem;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition:
        border-color 0.3s ease,
        box-shadow   0.3s ease,
        background   0.3s ease;
      outline: none;
      box-sizing: border-box;
    }

    .login-field__input::placeholder {
      color: rgba(255,255,255,0.25);
      font-size: 0.875rem;
    }

    .login-field__input:focus {
      border-color: rgba(212,175,55,0.7);
      background: rgba(212,175,55,0.04);
      box-shadow:
        0 0 0 3px rgba(212,175,55,0.10),
        0 0 20px rgba(212,175,55,0.12),
        inset 0 1px 0 rgba(212,175,55,0.08);
    }

    /* Focus ring sweep animation */
    .login-field__input:focus + .login-field__glow {
      opacity: 1;
      transform: scaleX(1);
    }

    .login-field__glow {
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.8), rgba(69,162,158,0.6), transparent);
      opacity: 0;
      transform: scaleX(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      border-radius: 0 0 14px 14px;
    }

    .login-field__icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .login-field:focus-within .login-field__icon {
      color: rgba(212,175,55,0.85);
    }

    .login-field__eye {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .login-field__eye:hover {
      color: rgba(212,175,55,0.9);
      background: rgba(212,175,55,0.08);
    }

    /* ── ENTER DASHBOARD BUTTON (highly visible) ── */
    .btn-login {
      position: relative;
      width: 100%;
      padding: 1.1rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      overflow: hidden;
      color: #0a0a0f;
      background: linear-gradient(135deg,
        #f5d061 0%,
        #d4af37 30%,
        #b8972e 60%,
        #d4af37 80%,
        #f5d061 100%);
      background-size: 200% 100%;
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.4),
        0 4px 24px rgba(212,175,55,0.45),
        0 8px 48px rgba(212,175,55,0.20);
      transition:
        transform 0.2s ease,
        box-shadow 0.3s ease;
      animation: btnGoldShift 4s ease-in-out infinite, btnPulse 3s ease-in-out infinite;
    }

    @keyframes btnGoldShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes btnPulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(212,175,55,0.4),
          0 4px 24px rgba(212,175,55,0.45),
          0 8px 48px rgba(212,175,55,0.20);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(212,175,55,0.6),
          0 4px 32px rgba(212,175,55,0.65),
          0 12px 60px rgba(212,175,55,0.30);
      }
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.7),
        0 8px 40px rgba(212,175,55,0.70),
        0 16px 64px rgba(212,175,55,0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Shine sweep on hover */
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg,
        transparent 20%,
        rgba(255,255,255,0.35) 50%,
        transparent 80%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn-login:hover::after {
      transform: translateX(100%);
    }

    .btn-login__text {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    /* Loading state */
    .btn-login.loading .btn-login__text { opacity: 0; }
    .btn-login.loading::before {
      content: '';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      margin: auto;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spinBtn 0.7s linear infinite;
    }
    @keyframes spinBtn {
      to { transform: rotate(360deg); }
    }

    /* Demo hint box */
    .login-hint {
      padding: 0.75rem 1rem;
      background: rgba(69,162,158,0.07);
      border: 1px solid rgba(69,162,158,0.2);
      border-radius: 12px;
      font-size: 0.78rem;
      color: rgba(69,162,158,0.9);
      line-height: 1.5;
    }
    .login-hint strong { color: rgba(69,162,158,1); }

    /* Form gap */
    .login-form-stack {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="aurora-bg" aria-hidden="true"></div>
  <div class="login-grid-bg" aria-hidden="true"></div>
  <div class="login-orb login-orb--tl" aria-hidden="true"></div>
  <div class="login-orb login-orb--br" aria-hidden="true"></div>

  <!-- ════════════ ADMIN LOGIN ════════════ -->
  <main class="admin-login-page" role="main" style="position:relative; z-index:1;">
    <div class="admin-login-card reveal scale-in">
      <!-- Badge -->
      <div class="admin-login-card__badge">
        <span class="admin-login-card__badge-dot" aria-hidden="true"></span>
        Bifrost Admin Portal
      </div>

      <!-- Title -->
      <h1 class="admin-login-card__title">
        Vortex Control<br>
        <span style="font-style:italic; font-weight:400; font-size:0.65em; color:var(--color-text-muted); letter-spacing:0.05em;">
          Management System
        </span>
      </h1>
      <p class="admin-login-card__subtitle" style="margin-bottom:1.8rem;">
        Secure access for authorized Bifrost personnel only.
      </p>

      <!-- Error message -->
      <div class="admin-login-error" id="login-error" role="alert" aria-live="polite">
        Invalid credentials. Please try again.
      </div>

      <!-- Login Form -->
      <form class="login-form-stack" id="admin-login-form" novalidate>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="admin-username" style="display:flex;align-items:center;gap:6px;">
            <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color:var(--color-gold);" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            Usuario
          </label>
          <div class="login-field">
            <svg class="login-field__icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input
              type="text"
              id="admin-username"
              name="username"
              class="login-field__input"
              placeholder="bifrost@admin"
              autocomplete="username"
              required
              aria-label="Admin username">
            <span class="login-field__glow"></span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="admin-password" style="display:flex;align-items:center;gap:6px;">
            <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color:var(--color-gold);" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            Contraseña
          </label>
          <div class="login-field">
            <svg class="login-field__icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input
              type="password"
              id="admin-password"
              name="password"
              class="login-field__input"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
              aria-label="Admin password"
              style="padding-right:3.5rem;">
            <span class="login-field__glow"></span>
            <button type="button" id="toggle-password" class="login-field__eye" aria-label="Toggle password visibility">
              <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" id="eye-icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Demo hint -->
        <div class="login-hint">
          Demo: <strong>bifrost@admin</strong> / <strong>vortex2024</strong>
        </div>

        <!-- Submit -->
        <button type="submit" id="login-submit" class="btn-login">
          <span class="btn-login__text">
            <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            Entrar al Dashboard
          </span>
        </button>
      </form>

      <!-- Back link -->
      <a href="../index.html" class="admin-back-link" style="margin-top:1.5rem;" aria-label="Go back to Bifrost S.A homepage">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver a Bifrost S.A
      </a>
    </div>
  </main>

  <!-- Background particles -->
  <div class="particles-layer" data-count="12" style="position:fixed; inset:0; z-index:0; pointer-events:none;" aria-hidden="true"></div>

  <script src="../js/database.js"></script>
  <script src="../js/effects.js"></script>
  <script src="../js/admin-auth.js"></script>
</body>
</html>
