<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bifrost S.A Admin Portal — Secure login for the Vortex management dashboard.">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Bifrost S.A</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/effects.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="aurora-bg" aria-hidden="true"></div>

  <!-- ════════════ ADMIN LOGIN ════════════ -->
  <main class="admin-login-page" role="main">
    <div class="admin-login-card glass--strong reveal scale-in">
      <!-- Badge -->
      <div class="admin-login-card__badge">
        <span class="admin-login-card__badge-dot" aria-hidden="true"></span>
        Bifrost Admin Portal
      </div>

      <!-- Title -->
      <h1 class="admin-login-card__title">
        Vortex Control<br>
        <span style="font-style:italic; font-weight:400; font-size:0.7em; color:var(--color-text-muted);">
          Management System
        </span>
      </h1>
      <p class="admin-login-card__subtitle">
        Secure access for authorized Bifrost personnel only.
      </p>

      <!-- Error message -->
      <div class="admin-login-error" id="login-error" role="alert" aria-live="polite">
        Invalid credentials. Please try again.
      </div>

      <!-- Login Form -->
      <form class="admin-login-form" id="admin-login-form" novalidate>
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="admin-username">Username</label>
          <div class="admin-input-wrap">
            <svg class="admin-input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input
              type="text"
              id="admin-username"
              name="username"
              class="form-input"
              placeholder="bifrost@admin"
              autocomplete="username"
              required
              aria-label="Admin username">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="admin-password">Password</label>
          <div class="admin-input-wrap" style="position:relative;">
            <svg class="admin-input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input
              type="password"
              id="admin-password"
              name="password"
              class="form-input"
              placeholder="Enter password"
              autocomplete="current-password"
              required
              aria-label="Admin password">
            <button type="button" id="toggle-password"
              style="position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--color-text-muted); display:flex; align-items:center; transition:color 150ms ease;"
              aria-label="Toggle password visibility">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Demo hint -->
        <div style="
          padding: var(--space-3) var(--space-4);
          background: rgba(69,162,158,0.06);
          border: 1px solid rgba(69,162,158,0.15);
          border-radius: var(--radius-md);
          font-size: var(--fs-xs);
          color: var(--color-frost);">
          Demo credentials: <strong>bifrost@admin</strong> / <strong>vortex2024</strong>
        </div>

        <!-- Submit -->
        <button type="submit" id="login-submit" class="btn btn--primary btn-ripple"
          style="width:100%; padding:1rem; font-size:var(--fs-sm);">
          Enter Dashboard
        </button>
      </form>

      <!-- Back link -->
      <a href="../index.html" class="admin-back-link" aria-label="Go back to Bifrost S.A homepage">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Return to Bifrost S.A
      </a>
    </div>
  </main>

  <!-- Background particles -->
  <div class="particles-layer" data-count="10" style="position:fixed; inset:0; z-index:0; pointer-events:none;" aria-hidden="true"></div>

  <script src="../js/database.js"></script>
  <script src="../js/effects.js"></script>
  <script src="../js/admin-auth.js"></script>
</body>
</html>
